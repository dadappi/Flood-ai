<!DOCTYPE html>
<html>
<head>
<title>Flood Risk AI</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
body{margin:0;display:flex;font-family:Arial;}

#sidebar{
width:260px;height:100vh;
background:linear-gradient(#0a3d62,#1e90ff);
color:white;padding:15px;
}

#map-wrap{flex:1;position:relative;}
#map{height:100vh;}

/* ISLAND */
#panel{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:min(500px,90%);
background:white;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
z-index:9999;
overflow:hidden;
transition:0.3s;
}

/* collapsed */
#panel.collapsed{
height:40px;
}

#panel-header{
text-align:center;
padding:8px;
font-weight:bold;
cursor:pointer;
background:#1e90ff;
color:white;
}

#panel-body{
padding:10px;
}

#panel input,button{
margin:5px;
padding:8px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#1e90ff;
color:white;
border:none;
}
</style>
</head>

<body>

<div id="sidebar">
<h2>Flood Risk AI</h2>
<p>PLS GUYS SELAMATIN GW DR ORNG JMT INI</p>
</div>

<div id="map-wrap">
<div id="map"></div>

<div id="panel" class="collapsed">
<div id="panel-header">⬆ Input</div>

<div id="panel-body">
<input id="rain" placeholder="Rain (0-100)">
<input id="elev" placeholder="Elevation (0-100)">
<input id="density" placeholder="Building (0-100)">
<input id="veg" placeholder="Vegetation (0-100)">
<input id="river" placeholder="River (0-100)">
<br>
<button onclick="manualPredict()">Prediksi</button>
</div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
